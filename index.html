<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Site Meta ──────────────────────────────────────────────── -->
    <title>Sabr Learning Labs — AI-Powered IT Cert Exam Prep (CompTIA, Cisco, AWS & more)</title>

    <meta name="theme-color" content="#080c18" />
    <link rel="canonical" href="https://sabr-labs.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/sabr-logo.png" />
    <link rel="apple-touch-icon" href="/sabr-logo.png" />

    <!-- Open Graph -->
    <meta property="og:site_name"   content="Sabr Learning Labs" />
    <meta property="og:title"       content="Sabr Learning Labs — AI-Powered IT Cert Exam Prep" />
    <meta property="og:description" content="Adaptive practice, spaced-repetition flashcards, and an AI study companion for CompTIA, Cisco, AWS, Microsoft, and more. One subscription, every cert." />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Sabr Learning Labs — AI-Powered IT Cert Exam Prep" />

    <!-- ─── Structured data — Organization + SoftwareApplication ─────
         Drives Google knowledge panel + AI Overview eligibility. Keep
         URLs absolute and offer prices in sync with the live Stripe
         catalog (see src/lib/tiers.ts in the learning app).          -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Sabr Learning Labs",
      "url": "https://sabr-labs.com/",
      "logo": "https://sabr-labs.com/sabr-logo.png",
      "sameAs": ["https://app.sabr-labs.com/"]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Sabr Learning Labs",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "url": "https://sabr-labs.com/",
      "description": "Adaptive IT certification exam prep with practice tests, spaced-repetition flashcards, and an AI study companion. Covers CompTIA, Cisco, Microsoft, AWS, Google Cloud, and more.",
      "offers": [
        { "@type": "Offer", "name": "Free",    "price": "0",  "priceCurrency": "USD" },
        { "@type": "Offer", "name": "Starter", "price": "12", "priceCurrency": "USD", "priceSpecification": { "@type": "UnitPriceSpecification", "price": "12", "priceCurrency": "USD", "billingIncrement": 1, "unitText": "MON" } },
        { "@type": "Offer", "name": "Pro",     "price": "24", "priceCurrency": "USD", "priceSpecification": { "@type": "UnitPriceSpecification", "price": "24", "priceCurrency": "USD", "billingIncrement": 1, "unitText": "MON" } },
        { "@type": "Offer", "name": "Premium", "price": "34", "priceCurrency": "USD", "priceSpecification": { "@type": "UnitPriceSpecification", "price": "34", "priceCurrency": "USD", "billingIncrement": 1, "unitText": "MON" } }
      ]
    }
    </script>

    <!-- ─── Fonts ────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-[#080c18] text-slate-100 font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
